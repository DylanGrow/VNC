name: Build, Lint & Verify VNC System

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pip-audit

      - name: Syntax Compilation Check
        run: python -m py_compile backend/*.py

      - name: Lint (ruff)
        run: ruff check backend/ --select E,W,F --ignore E501

      - name: Security Scan (pip-audit)
        run: pip-audit -r backend/requirements.txt --skip-editable
        continue-on-error: true

      - name: Run Backend Unit Tests
        run: python -m unittest tests/test_backend.py

  verify-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install Node Dependencies
        run: |
          cd frontend
          npm ci

      - name: Security Scan (npm audit)
        run: |
          cd frontend
          npm audit --audit-level=high
        continue-on-error: true

      - name: Type Check & Production Compile
        run: |
          cd frontend
          npm run build

  verify-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant Gradle Wrapper Execute Permission
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
